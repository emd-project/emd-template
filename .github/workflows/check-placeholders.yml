name: check-placeholders (désactivé)

# DÉSACTIVÉ — le garde-fou anti-placeholder faisait échouer le build sur des états
# LÉGITIMES du provisionnement « lean » (content/data/*.json encore vides, remplis
# ensuite par les boucles QA du week-end), ce qui bloquait les déploiements Vercel.
# Le script reste lançable à la main : `npm run check:placeholders`.
#
# Ce fichier ne peut pas être supprimé par l'outillage : il est donc réduit à un
# déclenchement MANUEL uniquement (plus de push, plus de pull_request).

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: echo "check-placeholders est désactivé. Lancer 'npm run check:placeholders' en local si besoin."
