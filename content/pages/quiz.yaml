# Quiz de la niche — À REMPLIR À L'INIT.
#
# Le moteur (components/quiz/QuizEngine.tsx) n'a AUCUNE question par défaut :
# plus de « Catégorie A / B / C », plus de « Modèle placeholder » à « À définir ».
#
# Deux issues valables, aucune troisième :
#  1. renseigner de vraies questions ci-dessous (3 à 5 steps, options de la niche) ;
#  2. désactiver le quiz : niche.config.ts → quiz.enabled: false.
#
# Tant que `steps` est vide ET que quiz.enabled vaut true, `npm run build` ÉCHOUE
# (scripts/check-placeholders.mjs) et /quiz renvoie 404. C'est voulu.
#
# Forme attendue :
# steps:
#   - id: "categorie"
#     question: "..."
#     options:
#       - label: "..."
#         value: "slug-de-la-famille"   # doit exister dans content/data/comparateurs.json
